<!DOCTYPE html>
<html>
<head>
<body>

<div class="main-container">
    <link rel="stylesheet" href="style.css">

    <!-- TOP BAR -->
    <div class="top-bar">
        <h3>Welcome, <span id="userDisplay"></span></h3>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- DASHBOARD TITLE -->
    <h1 class="dashboard-title">Employee Dashboard</h1>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Total Employees</h3>
            <p id="totalEmp">0</p>
        </div>
        <div class="card">
            <h3>Active Employees</h3>
            <p id="activeEmp">0</p>
        </div>
        <div class="card">
            <h3>Inactive Employees</h3>
            <p id="inactiveEmp">0</p>
        </div>
    </div>

    <!-- ADD EMPLOYEE -->
    <div class="form-section">
        <input type="text" id="name" placeholder="Employee Name">
        <select id="department">
            <option>Select Department</option>
            <option>HR</option>
            <option>IT</option>
            <option>Sales</option>
        </select>
        <button onclick="addEmployee()">Add Employee</button>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="search" placeholder="Search Employee...">
    </div>

    <!-- TABLE -->
    <div class="table-section">
        <h2>Employee Records</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="employeeTable"></tbody>
        </table>
    </div>

</div>

<button onclick="logout()">Logout</button>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>\

<script src="script.js"></script>

</body>
</html>
